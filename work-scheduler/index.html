    .work-scheduler-page {
      display: grid;
      gap: var(--space-6);
    }

    .sch-hero {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-7) 0 var(--space-3);
    }

    .sch-hero h1 {
      max-width: 14ch;
      margin-bottom: 0;
    }

    .sch-hero .page-lead {
      max-width: 780px;
    }

    .sch-actions,
    .sch-toolbar-row,
    .sch-filter,
    .sch-month-strip,
    .sch-card-actions,
    .sch-form-actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      align-items: center;
    }

    .sch-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: var(--space-4);
      align-items: start;
    }

    .sch-main-stack,
    .sch-side-stack {
      display: grid;
      gap: var(--space-4);
    }

    .sch-side-stack {
      position: sticky;
      top: 72px;
    }

    .sch-layout.is-calendar-view {
      grid-template-columns: minmax(0, 1fr);
    }

    .sch-layout.is-calendar-view .sch-side-stack {
      position: static;
      top: auto;
    }

    .sch-panel {
      display: grid;
      gap: var(--space-4);
      padding: var(--space-5);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
    }

    .sch-summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .sch-stat {
      min-width: 0;
      padding: var(--space-4);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
    }

    .sch-stat-label {
      display: block;
      margin-bottom: var(--space-1);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sch-stat-value {
      display: block;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: var(--fs-xl);
      font-weight: 700;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .sch-toolbar {
      display: grid;
      gap: var(--space-3);
    }

    .sch-toolbar-row {
      align-items: stretch;
    }

    .sch-toolbar-row input[type="search"] {
      flex: 1 1 280px;
    }

    .sch-date-jump {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: var(--space-2);
      align-items: center;
      min-width: min(100%, 430px);
    }

    .sch-view-toggle {
      display: inline-flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      overflow: hidden;
      background: var(--surface);

    .sch-view-btn {
      height: var(--h-control-sm);
      padding: 0 14px;
      border: 0;
      border-right: 1px solid var(--border);

      color: var(--text-secondary);
      font-size: var(--fs-sm);
      font-weight: 600;
    }

    .sch-view-btn:last-child {
      border-right: 0;
    }

    .sch-view-btn[aria-pressed="true"] {
      background: var(--accent);
      color: var(--accent-fg);
    }

      bottom: 70px;

      border-radius: var(--r-xl);

      color: var(--text-muted);
      font-size: var(--fs-xs);

      align-items: start;
      scroll-margin-top: 78px;

      top: 72px;
      display: grid;
      gap: var(--space-1);
      padding: var(--space-3) 0;
      border-top: 2px solid var(--text);

    .sch-date-button {

      border: 0;
      background: transparent;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);

      line-height: 1.35;

    }

    .sch-stack {

      gap: var(--space-3);
    }

    .sch-card {

      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: var(--border-strong);
    }

    .sch-card-head {
      display: grid;
      gap: var(--space-2);
    }

    .sch-card-line,
    .sch-badge-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-2);
    }

    .sch-type,
    .sch-scope,
    .sch-priority,
    .sch-status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-size: var(--fs-xs);
      font-weight: 700;
      white-space: nowrap;
    }

    .sch-type {
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .sch-type--budget,
    .sch-type--income,
    .sch-type--payroll,
    .sch-type--insurance,
    .sch-type--document,
    .sch-type--deadline,
    .sch-type--personal,
    .sch-type--system {
      background: var(--surface-2);
      color: var(--text-secondary);
      border-color: var(--border-strong);
    }

    .sch-type--deadline,
    .sch-priority--urgent {
      color: var(--danger);
      border-color: color-mix(in oklch, var(--danger) 35%, var(--border));
      background: color-mix(in oklch, var(--danger) 8%, var(--surface));
    }

    .sch-type--income,
    .sch-type--insurance {
      color: var(--school);
      border-color: color-mix(in oklch, var(--school) 38%, var(--border));
      background: color-mix(in oklch, var(--school) 10%, var(--surface));
    }

    .sch-type--budget,
    .sch-type--payroll {
      color: var(--brand);
      border-color: color-mix(in oklch, var(--brand) 30%, var(--border));
      background: color-mix(in oklch, var(--brand) 8%, var(--surface));
    }

    .sch-scope,
    .sch-status-pill {
      color: var(--text-muted);
      font-weight: 600;
    }

    .sch-status--done {
      color: var(--success);
      border-color: color-mix(in oklch, var(--success) 40%, var(--border));
    }

    .sch-status--doing {
      color: var(--brand);
      border-color: color-mix(in oklch, var(--brand) 35%, var(--border));
    }

    .sch-priority--high {

      border-color: var(--border-strong);
      background: var(--surface-2);
    }

    .sch-title {
      margin: 0;
      color: var(--text);
      font-size: var(--fs-md);

      letter-spacing: -0.015em;

    .sch-title-button {
      padding: 0;

      background: transparent;
      color: inherit;

      text-align: left;
      cursor: pointer;

    .sch-title-button:hover {
      color: var(--brand);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .sch-memo,
    .sch-card-foot {
      margin: 0;
      color: var(--text-secondary);
      font-size: var(--fs-sm);
      line-height: 1.6;
    }

    .sch-card-foot {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
    }

    .sch-card-actions {
      justify-content: flex-start;
    }

    .sch-mini-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: var(--fs-xs);
      font-weight: 700;
      text-decoration: none;
      white-space: nowrap;
    }

    .sch-mini-btn:hover {
      border-color: var(--border-strong);
      color: var(--text);
      background: var(--surface-hover);
      text-decoration: none;
    }

    .sch-mini-btn.danger {
      color: var(--danger);
    }

    .sch-empty-day,
    .sch-empty {
      padding: var(--space-4);
      background: transparent;
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-lg);
      color: var(--text-muted);
      font-size: var(--fs-sm);
    }

    .sch-calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .sch-calendar-title {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--fs-xl);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .sch-calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(110px, 1fr));
      gap: var(--space-2);
      overflow-x: auto;
      padding-bottom: var(--space-2);
    }

    .sch-weekday {
      padding: 8px 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sch-cell {
      min-height: 142px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      display: grid;
      align-content: start;
      gap: 8px;
      cursor: pointer;
      text-align: left;
      transition: border-color 150ms ease, background-color 150ms ease;
    }

    .sch-cell:hover {
      border-color: var(--border-strong);
      background: var(--surface-2);
    }

    .sch-cell.is-outside {
      opacity: 0.42;
    }

    .sch-cell.is-selected {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--ring);
    }

    .sch-cell.is-today .sch-cell-date {
      background: var(--accent);
      color: var(--accent-fg);
      border-radius: var(--r-pill);
      padding: 2px 8px;
    }

    .sch-cell-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .sch-cell-date {
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      font-weight: 800;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .sch-cell-count {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
    }

    .sch-cell-tasks {
      display: grid;
      gap: 6px;
    }

    .sch-cell-task {
      display: block;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 5px 7px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface-2);
      color: var(--text-secondary);
      font-size: var(--fs-xs);
      font-weight: 700;
    }

    .sch-cell-more {
      color: var(--text-muted);
      font-size: var(--fs-xs);
      font-family: var(--font-mono);
    }

    .sch-selected-card {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-4);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
    }

    .sch-selected-date {
      margin: 0;
      font-family: var(--font-mono);
      font-size: var(--fs-md);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .sch-selected-list {
      display: grid;
      gap: var(--space-2);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .sch-selected-item {
      display: grid;
      gap: 2px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }

    .sch-selected-item:last-child {
      border-bottom: 0;
    }

    .sch-selected-item button {
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font-weight: 700;
      text-align: left;
    }

    .sch-selected-item span {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
    }

    }

      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

      gap: var(--space-1);
    }

      color: var(--text);
      font-size: var(--fs-xs);
      font-weight: 800;
    }

    .sch-backup-row {
      display: grid;
      gap: var(--space-2);
    }

    .sch-help {

      background: var(--surface-2);

      border-radius: var(--r-lg);
      color: var(--text-secondary);
      font-size: var(--fs-sm);

        gap: var(--space-2);

        padding-bottom: 0;
      }
      .sch-date-jump,

        grid-template-columns: repeat(2, 1fr);
      }
      .sch-calendar-grid {
        grid-template-columns: repeat(7, 92px);

      .sch-cell {

      .sch-month-strip,
      .sch-filter {

        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 6px;
      }
      .sch-chip {
        flex: 0 0 auto;
      }

      .sch-floating-view-switch {
        right: 12px;
        bottom: 68px;
      }
      .sch-floating-label {

      }
      .sch-floating-view-switch .sch-view-btn {

      .sch-side-stack,
      .sch-actions,
      .site-header,
      .site-footer,

      .work-scheduler-page {

      }
      .sch-day {
        break-inside: avoid;
        grid-template-columns: 130px 1fr;
      }
      .sch-card {
        break-inside: avoid;
      }
    }

  <script>
    (function () {
      "use strict";

      const FALLBACK_DATA = {
        fiscalYear: { label: "2026회계", start: "2026-03-01", end: "2027-02-28", domain: "savinghaey.co.kr" },
        storageKey: "savinghaey.work-scheduler.2026fy.v1",
        categories: [
          { value: "budget", label: "예산·회계", shortLabel: "예산" },
          { value: "income", label: "세입·세외", shortLabel: "세입" },
          { value: "payroll", label: "인건비·복무", shortLabel: "인건비" },
          { value: "insurance", label: "사회보험", shortLabel: "보험" },
          { value: "document", label: "공문·보고", shortLabel: "공문" },
          { value: "deadline", label: "마감·기한", shortLabel: "마감" },
          { value: "personal", label: "개인메모", shortLabel: "개인" },
          { value: "system", label: "시스템", shortLabel: "설정" }
        ],
        statuses: [
          { value: "todo", label: "대기" },
          { value: "doing", label: "진행" },
          { value: "done", label: "완료" },
          { value: "hold", label: "보류" }
        ],
        priorities: [
          { value: "low", label: "낮음" },
          { value: "normal", label: "보통" },
          { value: "high", label: "중요" },
          { value: "urgent", label: "긴급" }
        ],
        tasks: []
      };

      const state = {
        cfg: FALLBACK_DATA,
        tasks: [],
        view: "timeline",
        selectedDate: "2026-03-01",
        currentMonth: "2026-03",
        typeFilter: "all",
        statusFilter: "all",
        q: "",
        hideEmpty: false,
        allDates: []
      };

      const el = {};

      function byId(id) { return document.getElementById(id); }

      function parseDate(iso) {
        const parts = String(iso || "").split("-").map(Number);
        if (parts.length !== 3 || parts.some(function (n) { return !Number.isFinite(n); })) return null;
        return new Date(parts[0], parts[1] - 1, parts[2]);
      }

      function formatISO(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + d;
      }

      function addDays(date, days) {
        const next = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        next.setDate(next.getDate() + days);
        return next;
      }

      function todayISO() { return formatISO(new Date()); }

      function isIsoDate(value) {
        const date = parseDate(value);
        return !!date && formatISO(date) === value;
      }

      function isInFiscalRange(date) {
        const fy = state.cfg.fiscalYear;
        return String(date) >= fy.start && String(date) <= fy.end;
      }

      function displayDate(iso) {
        const date = parseDate(iso);
        if (!date) return iso;
        return date.getFullYear() + "." + (date.getMonth() + 1) + "." + date.getDate() + ".";
      }

      function displayMonth(month) {
        const parts = String(month || "").split("-");
        if (parts.length !== 2) return month;
        return parts[0] + "." + Number(parts[1]);
      }

      function normalize(text) {
        return String(text || "")
          .toLowerCase()
          .normalize("NFC")
          .replace(/\s+/g, " ")
          .trim();
      }

      function escapeHtml(value) {
        return String(value === undefined || value === null ? "" : value).replace(/[&<>"']/g, function (char) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char];
        });
      }

      function escapeAttr(value) { return escapeHtml(value); }

      function labelFrom(list, value, fallback) {
        const found = (list || []).find(function (item) { return item.value === value; });
        return found ? found.label : (fallback || value || "-");
      }

      function category(value) {
        return (state.cfg.categories || []).find(function (item) { return item.value === value; }) || { value: value || "personal", label: value || "개인메모", shortLabel: value || "개인" };
      }

      function statusLabel(value) { return labelFrom(state.cfg.statuses, value, value); }
      function priorityLabel(value) { return labelFrom(state.cfg.priorities, value, value); }

      function priorityRank(value) {
        return { urgent: 0, high: 1, normal: 2, low: 3 }[value] ?? 4;
      }

      function makeId(prefix) {
        if (window.crypto && crypto.randomUUID) return (prefix || "task") + "-" + crypto.randomUUID();
        return (prefix || "task") + "-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
      }

      function sanitizeTask(raw) {
        const task = Object.assign({}, raw || {});
        task.id = String(task.id || makeId("task"));
        task.date = isIsoDate(task.date) ? task.date : state.cfg.fiscalYear.start;
        task.time = String(task.time || "").slice(0, 5);
        task.title = String(task.title || "업무명 미입력").trim() || "업무명 미입력";
        task.type = String(task.type || "personal");
        task.scope = String(task.scope || "").trim();
        task.priority = String(task.priority || "normal");
        task.status = String(task.status || "todo");
        task.memo = String(task.memo || "").trim();
        task.link = String(task.link || "").trim();
        task.tags = Array.isArray(task.tags) ? task.tags.map(String) : [];
        task.createdAt = String(task.createdAt || new Date().toISOString());
        task.updatedAt = String(task.updatedAt || task.createdAt);
        return task;
      }

      function generateDates() {
        const dates = [];
        let current = parseDate(state.cfg.fiscalYear.start);
        const end = parseDate(state.cfg.fiscalYear.end);
        while (current && end && current <= end) {
          dates.push(formatISO(current));
          current = addDays(current, 1);
        }
        state.allDates = dates;
      }

      function generateMonths() {
        const months = [];
        let date = parseDate(state.cfg.fiscalYear.start);
        const end = parseDate(state.cfg.fiscalYear.end);
        if (!date || !end) return months;
        date = new Date(date.getFullYear(), date.getMonth(), 1);
        while (date <= end) {
          months.push(formatISO(date).slice(0, 7));
          date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
        }
        return months;
      }

      function storageGet(key) {
        try { return localStorage.getItem(key); }
        catch (_) { return null; }
      }

      function storageSet(key, value) {
        try { localStorage.setItem(key, value); }
        catch (error) { alert("브라우저 저장소에 저장하지 못했습니다. JSON 백업을 이용해 주세요."); }
      }

      function storageRemove(key) {
        try { localStorage.removeItem(key); }
        catch (_) {}
      }

      function loadTasks() {
        const key = state.cfg.storageKey || FALLBACK_DATA.storageKey;
        const raw = storageGet(key);
        if (!raw) {
          state.tasks = (state.cfg.tasks || []).map(sanitizeTask);
          saveTasks();
          return;
        }

        try {
          const parsed = JSON.parse(raw);
          const source = Array.isArray(parsed) ? parsed : parsed.tasks;
          state.tasks = (Array.isArray(source) ? source : []).map(sanitizeTask);
        } catch (error) {
          state.tasks = (state.cfg.tasks || []).map(sanitizeTask);
          saveTasks();
        }
      }

      function saveTasks() {
        const key = state.cfg.storageKey || FALLBACK_DATA.storageKey;
        const payload = {
          fiscalYear: state.cfg.fiscalYear,
          savedAt: new Date().toISOString(),
          tasks: state.tasks
        };
        storageSet(key, JSON.stringify(payload));
      }

      async function loadConfig() {
        const fallback = window.WORK_SCHEDULER_DATA || FALLBACK_DATA;
        if (location.protocol === "file:") return fallback;

        try {
          const response = await fetch("./work-scheduler-data.json", { cache: "no-store" });
          if (!response.ok) throw new Error("data json not found");
          return await response.json();
        } catch (_) {
          return fallback;
        }
      }

      function readInitialState() {
        const params = new URLSearchParams(location.search || "");
        const view = params.get("view");
        const date = params.get("date");
        if (view === "timeline" || view === "calendar") state.view = view;
        if (date && isIsoDate(date) && isInFiscalRange(date)) state.selectedDate = date;
        else {
          const today = todayISO();
          state.selectedDate = isInFiscalRange(today) ? today : state.cfg.fiscalYear.start;
        }
        state.currentMonth = state.selectedDate.slice(0, 7);
      }

      function updateUrl() {
        try {
          const url = new URL(window.location.href);
          url.searchParams.set("date", state.selectedDate);
          url.searchParams.set("view", state.view);
          history.replaceState(null, "", url.pathname + url.search);
        } catch (_) {}
      }

      function bindElements() {
        [
          "statFiscal", "statTasks", "statRemain", "statImportant", "statMonth",
          "schedulerLayout", "monthStrip", "taskSearch", "statusFilter", "btnClearSearch", "typeFilter",
          "scheduleStatus", "hideEmptyDays", "dateJump", "btnGoDate", "btnToday",
          "timelineView", "timelineList", "calendarView", "calendarTitle", "calendarGrid",
          "btnPrevMonth", "btnNextMonth", "selectedTitle", "selectedMeta", "selectedList",
          "taskForm", "editingId", "taskDate", "taskTime", "taskTitle", "taskType",
          "taskPriority", "taskStatus", "taskScope", "taskMemo", "taskLink",
          "taskFormTitle", "btnCancelEdit", "btnExport", "btnImport", "btnMergePreset",
          "btnResetAll", "importFile", "btnPrintTop", "btnExportTop", "schedulerFloatingView"
        ].forEach(function (id) { el[id] = byId(id); });
      }

      function populateSelects() {
        el.statusFilter.innerHTML = '<option value="all">상태 전체</option>' +
          (state.cfg.statuses || []).map(function (status) {
            return '<option value="' + escapeAttr(status.value) + '">' + escapeHtml(status.label) + '</option>';
          }).join("");

        el.taskType.innerHTML = (state.cfg.categories || []).map(function (type) {
          return '<option value="' + escapeAttr(type.value) + '">' + escapeHtml(type.label) + '</option>';
        }).join("");

        el.taskPriority.innerHTML = (state.cfg.priorities || []).map(function (priority) {
          return '<option value="' + escapeAttr(priority.value) + '">' + escapeHtml(priority.label) + '</option>';
        }).join("");

        el.taskStatus.innerHTML = (state.cfg.statuses || []).map(function (status) {
          return '<option value="' + escapeAttr(status.value) + '">' + escapeHtml(status.label) + '</option>';
        }).join("");
      }

      function matchesTask(task) {
        if (state.typeFilter !== "all" && task.type !== state.typeFilter) return false;
        if (state.statusFilter !== "all" && task.status !== state.statusFilter) return false;

        const q = normalize(state.q);
        if (!q) return true;

        const tokens = q.split(" ").filter(Boolean);
        const cat = category(task.type);
        const haystack = normalize([
          task.date,
          displayDate(task.date),
          task.time,
          task.title,
          cat.label,
          cat.shortLabel,
          task.scope,
          task.priority,
          priorityLabel(task.priority),
          task.status,
          statusLabel(task.status),
          task.memo,
          task.link,
          (task.tags || []).join(" ")
        ].join(" "));

        return tokens.every(function (token) { return haystack.indexOf(token) !== -1; });
      }

      function visibleTasks() {
        return state.tasks
          .filter(function (task) { return isInFiscalRange(task.date); })
          .filter(matchesTask)
          .sort(compareTask);
      }

      function compareTask(a, b) {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        if ((a.time || "") !== (b.time || "")) return (a.time || "99:99") < (b.time || "99:99") ? -1 : 1;
        const pr = priorityRank(a.priority) - priorityRank(b.priority);
        if (pr !== 0) return pr;
        return a.title.localeCompare(b.title, "ko");
      }

      function tasksByDate(tasks) {
        const map = new Map();
        tasks.forEach(function (task) {
          if (!map.has(task.date)) map.set(task.date, []);
          map.get(task.date).push(task);
        });
        map.forEach(function (list) { list.sort(compareTask); });
        return map;
      }

      function allTasksByDate() {
        return tasksByDate(state.tasks.filter(function (task) { return isInFiscalRange(task.date); }));
      }

      function renderSummary() {
        const total = state.tasks.length;
        const remain = state.tasks.filter(function (task) { return task.status !== "done"; }).length;
        const important = state.tasks.filter(function (task) { return task.priority === "urgent" || task.priority === "high"; }).length;
        const monthCount = state.tasks.filter(function (task) { return task.date.slice(0, 7) === state.currentMonth; }).length;

        el.statFiscal.textContent = state.cfg.fiscalYear.label || "2026";
        el.statTasks.textContent = String(total);
        el.statRemain.textContent = String(remain);
        el.statImportant.textContent = String(important);
        el.statMonth.textContent = String(monthCount);
      }

      function renderTypeFilter() {
        const counts = new Map();
        state.tasks.forEach(function (task) { counts.set(task.type, (counts.get(task.type) || 0) + 1); });
        const allCount = state.tasks.length;
        const chips = [
          '<button class="sch-chip" type="button" data-type-filter="all" aria-pressed="' + String(state.typeFilter === "all") + '">전체 <span class="sch-chip-count">' + allCount + '</span></button>'
        ].concat((state.cfg.categories || []).map(function (type) {
          const active = state.typeFilter === type.value;
          return '<button class="sch-chip" type="button" data-type-filter="' + escapeAttr(type.value) + '" aria-pressed="' + String(active) + '">' +
            escapeHtml(type.shortLabel || type.label) + ' <span class="sch-chip-count">' + (counts.get(type.value) || 0) + '</span></button>';
        }));
        el.typeFilter.innerHTML = chips.join("");
      }

      function renderMonthStrip() {
        const monthMap = new Map();
        state.tasks.forEach(function (task) {
          const month = task.date.slice(0, 7);
          monthMap.set(month, (monthMap.get(month) || 0) + 1);
        });
        el.monthStrip.innerHTML = generateMonths().map(function (month) {
          const active = month === state.currentMonth;
          return '<button class="sch-chip sch-month-chip" type="button" data-month="' + escapeAttr(month) + '" aria-pressed="' + String(active) + '">' +
            escapeHtml(displayMonth(month)) + ' <span class="sch-chip-count">' + (monthMap.get(month) || 0) + '</span></button>';
        }).join("");
      }

      function renderTaskCard(task, options) {
        const opts = options || {};
        const cat = category(task.type);
        const done = task.status === "done";
        const cardClass = "sch-card" + (done ? " is-done" : "");
        const time = task.time ? '<span>' + escapeHtml(task.time) + '</span>' : "";
        const link = task.link ? '<a class="sch-mini-btn" href="' + escapeAttr(task.link) + '" target="_blank" rel="noopener noreferrer">링크</a>' : "";
        const memo = task.memo ? '<p class="sch-memo">' + escapeHtml(task.memo) + '</p>' : "";
        const dateText = opts.showDate ? '<span>' + escapeHtml(displayDate(task.date)) + '</span>' : "";

        return [
          '<article class="' + cardClass + '" data-task-id="' + escapeAttr(task.id) + '">',
          '  <header class="sch-card-head">',
          '    <div class="sch-card-line">',
          '      <span class="sch-type sch-type--' + escapeAttr(task.type) + '">' + escapeHtml(cat.shortLabel || cat.label) + '</span>',
          task.scope ? '      <span class="sch-scope">' + escapeHtml(task.scope) + '</span>' : '',
          '      <span class="sch-priority sch-priority--' + escapeAttr(task.priority) + '">' + escapeHtml(priorityLabel(task.priority)) + '</span>',
          '      <span class="sch-status-pill sch-status--' + escapeAttr(task.status) + '">' + escapeHtml(statusLabel(task.status)) + '</span>',
          '    </div>',
          '    <h3 class="sch-title"><button class="sch-title-button" type="button" data-action="edit" data-task-id="' + escapeAttr(task.id) + '">' + escapeHtml(task.title) + '</button></h3>',
          '  </header>',
          memo,
          '  <div class="sch-card-foot">' + [dateText, time, task.tags && task.tags.length ? '<span>#' + task.tags.map(escapeHtml).join(' #') + '</span>' : ''].filter(Boolean).join(' ') + '</div>',
          '  <div class="sch-card-actions">',
          '    <button class="sch-mini-btn" type="button" data-action="toggle-done" data-task-id="' + escapeAttr(task.id) + '">' + (done ? '미완료로' : '완료') + '</button>',
          '    <button class="sch-mini-btn" type="button" data-action="edit" data-task-id="' + escapeAttr(task.id) + '">수정</button>',
          link,
          '    <button class="sch-mini-btn danger" type="button" data-action="delete" data-task-id="' + escapeAttr(task.id) + '">삭제</button>',
          '  </div>',
          '</article>'
        ].join("");
      }

      function renderTimeline() {
        const tasks = visibleTasks();
        const map = tasksByDate(tasks);
        const dates = state.allDates.filter(function (date) {
          if (!state.hideEmpty) return true;
          return map.has(date);
        });

        if (!dates.length) {
          el.timelineList.innerHTML = '<div class="sch-empty"><strong>표시할 날짜가 없습니다.</strong><br />검색어나 필터를 줄여보세요.</div>';
          return;
        }

        el.timelineList.innerHTML = dates.map(function (date) {
          const list = map.get(date) || [];
          const selected = date === state.selectedDate ? " is-selected" : "";
          return [
            '<section class="sch-day' + selected + '" id="d-' + escapeAttr(date) + '" data-day="' + escapeAttr(date) + '">',
            '  <header class="sch-day-head">',
            '    <button class="sch-date-button" type="button" data-date="' + escapeAttr(date) + '">' + escapeHtml(displayDate(date)) + '</button>',
            '    <span class="sch-day-meta">' + escapeHtml(date.slice(0, 7)) + ' · ' + list.length + '건</span>',
            '  </header>',
            '  <div class="sch-stack">',
            list.length ? list.map(function (task) { return renderTaskCard(task); }).join("") : '<div class="sch-empty-day">등록된 업무가 없습니다.</div>',
            '  </div>',
            '</section>'
          ].join("");
        }).join("");
      }

      function getMonthGridDates(month) {
        const first = parseDate(month + "-01");
        if (!first) return [];
        const sundayBasedDay = first.getDay();
        let cursor = addDays(first, -sundayBasedDay);
        const result = [];
        for (let i = 0; i < 42; i += 1) {
          result.push(formatISO(cursor));
          cursor = addDays(cursor, 1);
        }
        return result;
      }

      function renderCalendar() {
        const allMap = allTasksByDate();
        const visibleMap = tasksByDate(visibleTasks());
        const month = state.currentMonth;
        el.calendarTitle.textContent = displayMonth(month);

        const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
        const cells = weekdays.map(function (day) { return '<div class="sch-weekday">' + day + '</div>'; });

        getMonthGridDates(month).forEach(function (date) {
          const allCount = (allMap.get(date) || []).length;
          const visible = visibleMap.get(date) || [];
          const outside = date.slice(0, 7) !== month;
          const selected = date === state.selectedDate;
          const today = date === todayISO();
          const disabled = !isInFiscalRange(date);
          const cellClass = ["sch-cell", outside ? "is-outside" : "", selected ? "is-selected" : "", today ? "is-today" : ""].filter(Boolean).join(" ");
          const taskLines = visible.slice(0, 3).map(function (task) {
            return '<span class="sch-cell-task" title="' + escapeAttr(task.title) + '">' + escapeHtml(task.title) + '</span>';
          }).join("");
          const more = visible.length > 3 ? '<span class="sch-cell-more">+' + (visible.length - 3) + ' more</span>' : "";
          cells.push([
            '<button class="' + cellClass + '" type="button" data-date="' + escapeAttr(date) + '"' + (disabled ? ' disabled' : '') + '>',
            '  <span class="sch-cell-top"><span class="sch-cell-date">' + Number(date.slice(8, 10)) + '</span><span class="sch-cell-count">' + allCount + '건</span></span>',
            '  <span class="sch-cell-tasks">' + taskLines + more + '</span>',
            '</button>'
          ].join(""));
        });

        el.calendarGrid.innerHTML = cells.join("");
      }

      function renderSelectedPanel() {
        const list = state.tasks.filter(function (task) { return task.date === state.selectedDate; }).sort(compareTask);
        el.selectedTitle.textContent = displayDate(state.selectedDate);
        el.selectedMeta.textContent = list.length + "건 등록됨 · " + state.selectedDate;
        if (!list.length) {
          el.selectedList.innerHTML = '<li class="sch-empty-day">이 날짜에는 등록된 업무가 없습니다.</li>';
          return;
        }
        el.selectedList.innerHTML = list.map(function (task) {
          return [
            '<li class="sch-selected-item">',
            '  <button type="button" data-action="edit" data-task-id="' + escapeAttr(task.id) + '">' + escapeHtml(task.title) + '</button>',
            '  <span>' + escapeHtml([task.time, category(task.type).shortLabel || category(task.type).label, statusLabel(task.status)].filter(Boolean).join(' · ')) + '</span>',
            '</li>'
          ].join("");
        }).join("");
      }

      function renderStatus(tasks) {
        const visible = tasks || visibleTasks();
        const filterText = state.typeFilter === "all" ? "전체 유형" : category(state.typeFilter).label;
        const statusText = state.statusFilter === "all" ? "전체 상태" : statusLabel(state.statusFilter);
        const searchText = state.q ? ' · 검색어 "' + state.q + '"' : "";
        el.scheduleStatus.textContent = filterText + " / " + statusText + " 기준 " + visible.length + "건 표시" + searchText;
        el.btnClearSearch.hidden = !state.q && state.statusFilter === "all" && state.typeFilter === "all";
      }

      function renderViewButtons() {
        document.querySelectorAll(".sch-view-btn[data-view]").forEach(function (button) {
          button.setAttribute("aria-pressed", String(button.getAttribute("data-view") === state.view));
        });
        el.timelineView.hidden = state.view !== "timeline";
        el.calendarView.hidden = state.view !== "calendar";
        if (el.schedulerLayout) {
          el.schedulerLayout.classList.toggle("is-timeline-view", state.view === "timeline");
          el.schedulerLayout.classList.toggle("is-calendar-view", state.view === "calendar");
        }
      }

      function resetForm() {
        el.editingId.value = "";
        el.taskFormTitle.textContent = "업무 추가";
        el.taskDate.value = state.selectedDate;
        el.taskTime.value = "";
        el.taskTitle.value = "";
        el.taskType.value = (state.cfg.categories && state.cfg.categories[0] && state.cfg.categories[0].value) || "personal";
        el.taskPriority.value = "normal";
        el.taskStatus.value = "todo";
        el.taskScope.value = "";
        el.taskMemo.value = "";
        el.taskLink.value = "";
      }

      function renderAll(options) {
        const opts = options || {};
        renderSummary();
        renderTypeFilter();
        renderMonthStrip();
        renderViewButtons();
        renderTimeline();
        renderCalendar();
        renderSelectedPanel();
        renderStatus();
        el.dateJump.value = state.selectedDate;
        el.hideEmptyDays.checked = state.hideEmpty;
        el.statusFilter.value = state.statusFilter;
        if (!el.editingId.value) el.taskDate.value = state.selectedDate;
        if (opts.scrollTimeline && state.view === "timeline") scrollToSelectedDay();
        if (opts.scrollCalendar && state.view === "calendar") scrollToCalendarView();
        syncFloatingViewSwitch();
        updateUrl();
      }

      function scrollToSelectedDay() {
        window.setTimeout(function () {
          const node = document.getElementById("d-" + state.selectedDate);
          if (node) node.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 30);
      }

      function scrollToCalendarView() {
        window.setTimeout(function () {
          if (el.calendarView) el.calendarView.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 30);
      }

      function syncFloatingViewSwitch() {
        if (!el.schedulerFloatingView) return;
        const y = window.pageYOffset || document.documentElement.scrollTop || 0;
        el.schedulerFloatingView.classList.toggle("is-visible", y > 240);
      }

      function selectDate(date, options) {
        if (!isIsoDate(date) || !isInFiscalRange(date)) return;
        state.selectedDate = date;
        state.currentMonth = date.slice(0, 7);
        renderAll(options || {});
      }

      function setView(view) {
        if (view !== "timeline" && view !== "calendar") return;
        state.view = view;
        renderAll({
          scrollTimeline: view === "timeline",
          scrollCalendar: view === "calendar"
        });
      }

      function changeMonth(delta) {
        const current = parseDate(state.currentMonth + "-01");
        if (!current) return;
        const next = new Date(current.getFullYear(), current.getMonth() + delta, 1);
        const nextMonth = formatISO(next).slice(0, 7);
        const months = generateMonths();
        if (!months.includes(nextMonth)) return;
        state.currentMonth = nextMonth;
        const candidate = nextMonth + "-01";
        state.selectedDate = isInFiscalRange(candidate) ? candidate : state.cfg.fiscalYear.start;
        renderAll();
      }

      function findTask(id) {
        return state.tasks.find(function (task) { return task.id === id; });
      }

      function editTask(id) {
        const task = findTask(id);
        if (!task) return;
        selectDate(task.date);
        el.editingId.value = task.id;
        el.taskFormTitle.textContent = "업무 수정";
        el.taskDate.value = task.date;
        el.taskTime.value = task.time || "";
        el.taskTitle.value = task.title;
        el.taskType.value = task.type;
        el.taskPriority.value = task.priority;
        el.taskStatus.value = task.status;
        el.taskScope.value = task.scope || "";
        el.taskMemo.value = task.memo || "";
        el.taskLink.value = task.link || "";
        el.taskTitle.focus();
      }

      function deleteTask(id) {
        const task = findTask(id);
        if (!task) return;
        if (!confirm('"' + task.title + '" 일정을 삭제할까요?')) return;
        state.tasks = state.tasks.filter(function (item) { return item.id !== id; });
        saveTasks();
        renderAll();
      }

      function toggleDone(id) {
        const task = findTask(id);
        if (!task) return;
        task.status = task.status === "done" ? "todo" : "done";
        task.updatedAt = new Date().toISOString();
        saveTasks();
        renderAll();
      }

      function handleFormSubmit(event) {
        event.preventDefault();
        const id = el.editingId.value.trim();
        const raw = {
          id: id || makeId("custom"),
          date: el.taskDate.value,
          time: el.taskTime.value,
          title: el.taskTitle.value,
          type: el.taskType.value,
          priority: el.taskPriority.value,
          status: el.taskStatus.value,
          scope: el.taskScope.value,
          memo: el.taskMemo.value,
          link: el.taskLink.value,
          updatedAt: new Date().toISOString()
        };
        const task = sanitizeTask(raw);
        if (!isInFiscalRange(task.date)) {
          alert("2026회계 기간 안의 날짜만 저장할 수 있습니다.");
          return;
        }

        if (id) {
          const index = state.tasks.findIndex(function (item) { return item.id === id; });
          if (index >= 0) {
            task.createdAt = state.tasks[index].createdAt || task.createdAt;
            state.tasks[index] = task;
          } else {
            state.tasks.push(task);
          }
        } else {
          state.tasks.push(task);
        }

        saveTasks();
        state.selectedDate = task.date;
        state.currentMonth = task.date.slice(0, 7);
        resetForm();
        renderAll({ scrollTimeline: state.view === "timeline" });
      }

      function exportTasks() {
        const payload = {
          exportedAt: new Date().toISOString(),
          fiscalYear: state.cfg.fiscalYear,
          tasks: state.tasks
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date().toISOString().slice(0, 16).replace(/[-:T]/g, "");
        a.href = url;
        a.download = "savinghaey-work-scheduler-2026fy-" + stamp + ".json";
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.setTimeout(function () { URL.revokeObjectURL(url); }, 500);
      }

      function mergeTasks(incoming) {
        const map = new Map();
        state.tasks.forEach(function (task) { map.set(task.id, task); });
        incoming.map(sanitizeTask).forEach(function (task) { map.set(task.id, task); });
        state.tasks = Array.from(map.values()).sort(compareTask);
        saveTasks();
        renderAll();
      }

      function importTasks(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function () {
          try {
            const parsed = JSON.parse(String(reader.result || ""));
            const source = Array.isArray(parsed) ? parsed : parsed.tasks;
            if (!Array.isArray(source)) throw new Error("tasks array not found");
            if (!confirm("가져온 JSON 일정을 현재 일정에 합칠까요? 같은 id는 가져온 값으로 덮어씁니다.")) return;
            mergeTasks(source);
          } catch (error) {
            alert("JSON 파일을 읽지 못했습니다. 형식을 확인해 주세요.");
          } finally {
            el.importFile.value = "";
          }
        };
        reader.readAsText(file, "utf-8");
      }

      function mergePreset() {
        mergeTasks((state.cfg.tasks || []).map(sanitizeTask));
      }

      function resetAll() {
        if (!confirm("전체 일정을 기본값으로 초기화할까요? 현재 브라우저에 저장된 수정 사항이 삭제됩니다.")) return;
        storageRemove(state.cfg.storageKey || FALLBACK_DATA.storageKey);
        state.tasks = (state.cfg.tasks || []).map(sanitizeTask);
        saveTasks();
        resetForm();
        renderAll({ scrollTimeline: state.view === "timeline" });
      }

      function bindEvents() {
        document.addEventListener("click", function (event) {
          const actionNode = event.target.closest("[data-action]");
          if (actionNode) {
            const action = actionNode.getAttribute("data-action");
            const taskId = actionNode.getAttribute("data-task-id");
            if (action === "edit") editTask(taskId);
            if (action === "delete") deleteTask(taskId);
            if (action === "toggle-done") toggleDone(taskId);
            return;
          }

          const viewButton = event.target.closest("[data-view]");
          if (viewButton) {
            setView(viewButton.getAttribute("data-view"));
            return;
          }

          const typeButton = event.target.closest("[data-type-filter]");
          if (typeButton) {
            state.typeFilter = typeButton.getAttribute("data-type-filter") || "all";
            renderAll();
            return;
          }

          const monthButton = event.target.closest("[data-month]");
          if (monthButton) {
            const month = monthButton.getAttribute("data-month");
            state.currentMonth = month;
            const first = month + "-01";
            state.selectedDate = isInFiscalRange(first) ? first : state.cfg.fiscalYear.start;
            renderAll({ scrollTimeline: state.view === "timeline" });
            return;
          }

          const dateButton = event.target.closest("[data-date]");
          if (dateButton) {
            const date = dateButton.getAttribute("data-date");
            selectDate(date, { scrollTimeline: state.view === "timeline" });
          }
        });

        el.taskSearch.addEventListener("input", function () {
          state.q = el.taskSearch.value.trim();
          renderAll();
        });

        el.statusFilter.addEventListener("change", function () {
          state.statusFilter = el.statusFilter.value;
          renderAll();
        });

        el.btnClearSearch.addEventListener("click", function () {
          state.q = "";
          state.typeFilter = "all";
          state.statusFilter = "all";
          el.taskSearch.value = "";
          renderAll();
          el.taskSearch.focus();
        });

        el.hideEmptyDays.addEventListener("change", function () {
          state.hideEmpty = !!el.hideEmptyDays.checked;
          renderAll();
        });

        el.btnGoDate.addEventListener("click", function () {
          selectDate(el.dateJump.value, { scrollTimeline: state.view === "timeline" });
        });

        el.dateJump.addEventListener("keydown", function (event) {
          if (event.key === "Enter") selectDate(el.dateJump.value, { scrollTimeline: state.view === "timeline" });
        });

        el.btnToday.addEventListener("click", function () {
          const today = todayISO();
          selectDate(isInFiscalRange(today) ? today : state.cfg.fiscalYear.start, { scrollTimeline: state.view === "timeline" });
        });

        el.btnPrevMonth.addEventListener("click", function () { changeMonth(-1); });
        el.btnNextMonth.addEventListener("click", function () { changeMonth(1); });
        el.taskForm.addEventListener("submit", handleFormSubmit);
        el.btnCancelEdit.addEventListener("click", resetForm);
        el.btnExport.addEventListener("click", exportTasks);
        el.btnExportTop.addEventListener("click", exportTasks);
        el.btnImport.addEventListener("click", function () { el.importFile.click(); });
        el.importFile.addEventListener("change", function () { importTasks(el.importFile.files && el.importFile.files[0]); });
        el.btnMergePreset.addEventListener("click", mergePreset);
        el.btnResetAll.addEventListener("click", resetAll);
        el.btnPrintTop.addEventListener("click", function () { window.print(); });

        window.addEventListener("scroll", syncFloatingViewSwitch, { passive: true });
        window.addEventListener("resize", syncFloatingViewSwitch);
        window.addEventListener("orientationchange", syncFloatingViewSwitch);
        syncFloatingViewSwitch();
      }

      async function init() {
        bindElements();
        state.cfg = Object.assign({}, FALLBACK_DATA, await loadConfig());
        state.cfg.fiscalYear = Object.assign({}, FALLBACK_DATA.fiscalYear, state.cfg.fiscalYear || {});
        state.cfg.categories = Array.isArray(state.cfg.categories) ? state.cfg.categories : FALLBACK_DATA.categories;
        state.cfg.statuses = Array.isArray(state.cfg.statuses) ? state.cfg.statuses : FALLBACK_DATA.statuses;
        state.cfg.priorities = Array.isArray(state.cfg.priorities) ? state.cfg.priorities : FALLBACK_DATA.priorities;
        state.cfg.tasks = Array.isArray(state.cfg.tasks) ? state.cfg.tasks : [];

        generateDates();
        readInitialState();
        populateSelects();
        loadTasks();
        resetForm();
        bindEvents();
        renderAll({ scrollTimeline: state.view === "timeline" });
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
